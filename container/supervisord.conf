[supervisord]
logfile=/var/www/app/storage/logs/supervisord.log
logfile_backups=10
loglevel=info
pidfile=/tmp/supervisord-brezel-api.pid
nodaemon=true
minfds=1024
minprocs=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[unix_http_server]
file=/tmp/supervisor-brezel.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor-brezel.sock

[include]
files = /var/www/app/storage/workers.supervisord.conf
